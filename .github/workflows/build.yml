name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/atomlauncher
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.atomlauncher">
              <application
                  android:allowBackup="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:stateNotNeeded="true"
                      android:resumeWhilePausing="true"
                      android:screenOrientation="nosensor"
                      android:hardwareAccelerated="false"
                      android:excludeFromRecents="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.HOME" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/example/atomlauncher/MainActivity.java << 'EOF'
          package com.example.atomlauncher;
          import android.app.Activity;
          import android.content.Intent;
          import android.graphics.Color;
          import android.graphics.Paint;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.util.TypedValue;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.FrameLayout;
          import android.widget.LinearLayout;
          import android.widget.TextClock;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY |
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_LAYOUT_STABLE |
                      View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                  );
                  float dp = getResources().getDisplayMetrics().density;
                  FrameLayout root = new FrameLayout(this);
                  TextView text = new TextView(this);
                  text.setText("FOCUS on your GOALS, your PEACE & your HAPPINESS.\nDon't waste your TIME on anything that doesn't contribute to your GROWTH");
                  text.setTextColor(Color.WHITE);
                  text.setTextSize(TypedValue.COMPLEX_UNIT_SP, 17);
                  text.setGravity(Gravity.CENTER);
                  text.setPadding(100, 0, 100, 0);
                  FrameLayout.LayoutParams textParams = new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      FrameLayout.LayoutParams.WRAP_CONTENT,
                      Gravity.CENTER
                  );
                  text.setLayoutParams(textParams);
                  LinearLayout clockContainer = new LinearLayout(this);
                  clockContainer.setOrientation(LinearLayout.VERTICAL);
                  clockContainer.setGravity(Gravity.CENTER_HORIZONTAL);
                  FrameLayout.LayoutParams clockContainerParams = new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      FrameLayout.LayoutParams.WRAP_CONTENT,
                      Gravity.CENTER
                  );
                  clockContainer.setLayoutParams(clockContainerParams);
                  clockContainer.setTranslationY(-140 * dp);
                  TextClock clock = new TextClock(this);
                  clock.setFormat12Hour("hh:mm a");
                  clock.setFormat24Hour("HH:mm");
                  clock.setTextColor(Color.WHITE);
                  clock.setTextSize(TypedValue.COMPLEX_UNIT_SP, 40);
                  clock.setGravity(Gravity.CENTER);
                  LinearLayout.LayoutParams clockParams = new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  );
                  clock.setLayoutParams(clockParams);
                  TextClock date = new TextClock(this);
                  date.setFormat12Hour("EEEE, d MMMM");
                  date.setFormat24Hour("EEEE, d MMMM");
                  date.setTextColor(Color.WHITE);
                  date.setTextSize(TypedValue.COMPLEX_UNIT_SP, 14);
                  date.setGravity(Gravity.CENTER);
                  LinearLayout.LayoutParams dateParams = new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  );
                  date.setLayoutParams(dateParams);
                  clockContainer.addView(clock);
                  clockContainer.addView(date);
                  TextView wifi = new TextView(this);
                  wifi.setText("Wi-Fi Settings");
                  wifi.setTextColor(Color.WHITE);
                  wifi.setTextSize(TypedValue.COMPLEX_UNIT_SP, 12);
                  wifi.setGravity(Gravity.CENTER);
                  wifi.setPaintFlags(wifi.getPaintFlags() | Paint.UNDERLINE_TEXT_FLAG);
                  wifi.setPadding(0, 0, 0, 60);
                  FrameLayout.LayoutParams wifiParams = new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.WRAP_CONTENT,
                      FrameLayout.LayoutParams.WRAP_CONTENT,
                      Gravity.BOTTOM | Gravity.CENTER_HORIZONTAL
                  );
                  wifi.setLayoutParams(wifiParams);
                  wifi.setOnClickListener(new View.OnClickListener() {
                      public void onClick(View v) {
                          startActivity(new Intent(Settings.ACTION_WIFI_SETTINGS));
                      }
                  });
                  root.addView(clockContainer);
                  root.addView(text);
                  root.addView(wifi);
                  setContentView(root);
              }
              @Override
              public void onBackPressed() {}
          }
          EOF

      - name: Write resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Atom Launcher</string>
          </resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
                  <item name="android:windowBackground">@android:color/transparent</item>
                  <item name="android:windowIsTranslucent">true</item>
                  <item name="android:windowShowWallpaper">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#000000" />
          </shape>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

      - name: Write Gradle files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "AtomLauncher"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.atomlauncher'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.atomlauncher"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {}
          EOF

          cat > app/proguard-rules.pro << 'EOF'
          -keep class com.example.atomlauncher.MainActivity
          -dontwarn **
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias atom-launcher \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass atomlauncher123 \
            -keypass atomlauncher123 \
            -dname "CN=Atom Launcher, OU=App, O=Personal, L=Unknown, ST=Unknown, C=US"

      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks \
            -Pandroid.injected.signing.store.password=atomlauncher123 \
            -Pandroid.injected.signing.key.alias=atom-launcher \
            -Pandroid.injected.signing.key.password=atomlauncher123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: atom-launcher-release
          path: app/build/outputs/apk/release/app-release.apk
