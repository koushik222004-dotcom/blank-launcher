name: Build Router Admin APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/routeradmin
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.routeradmin">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="Router Admin"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/example/routeradmin/MainActivity.java << 'EOF'
          package com.example.routeradmin;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              WebView web;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  web = new WebView(this);
                  web.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest req) {
                          String host = req.getUrl().getHost();
                          if (host != null && host.equals("192.168.8.1")) {
                              view.loadUrl(req.getUrl().toString());
                          }
                          return true;
                      }
                  });
                  WebSettings s = web.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(true);
                  setContentView(web);
                  web.loadUrl("http://192.168.8.1");
              }

              @Override
              public void onBackPressed() {
                  if (web.canGoBack()) web.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

      - name: Write resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Router Admin</string></resources>
          EOF

      - name: Write Gradle files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "RouterAdmin"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.2.2' apply false }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.routeradmin'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.routeradmin"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -sL https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar

          cat > gradlew << 'EOF'
          #!/bin/sh
          exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
          EOF
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: router-admin
          path: app/build/outputs/apk/debug/app-debug.apk
