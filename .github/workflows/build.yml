name: Build Blank Launcher APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Create project files
        run: |
          mkdir -p app/src/main/java/com/example/blanklauncher
          mkdir -p app/src/main/res/values

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "BlankLauncher"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.3.2' apply false
          }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          android.useAndroidX=false
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.blanklauncher'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.blanklauncher"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword "blanklauncher"
                      keyAlias "launcher"
                      keyPassword "blanklauncher"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              aaptOptions {
                  cruncherEnabled false
              }
          }
          dependencies {}
          EOF

          cat > app/proguard-rules.pro << 'EOF'
          -keep class com.example.blanklauncher.MainActivity { *; }
          -dontwarn **
          -optimizationpasses 5
          -allowaccessmodification
          -overloadaggressively
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:hardwareAccelerated="false">
                  <activity
                      android:name=".MainActivity"
                      android:theme="@style/Theme.BlankLauncher"
                      android:exported="true"
                      android:launchMode="singleTask"
                      android:stateNotNeeded="true"
                      android:excludeFromRecents="true"
                      android:resumeWhilePausing="true"
                      android:screenOrientation="nosensor"
                      android:configChanges="orientation|screenSize|screenLayout|keyboardHidden|uiMode"
                      android:windowSoftInputMode="stateAlwaysHidden|adjustNothing">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.HOME" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/example/blanklauncher/MainActivity.java << 'EOF'
          package com.example.blanklauncher;

          import android.app.Activity;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowInsets;
          import android.view.WindowInsetsController;

          public class MainActivity extends Activity {

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      getWindow().setDecorFitsSystemWindows(false);
                  }
                  applyImmersive();
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) applyImmersive();
              }

              @SuppressWarnings("deprecation")
              private void applyImmersive() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      WindowInsetsController c = getWindow().getInsetsController();
                      if (c != null) {
                          c.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());
                          c.setSystemBarsBehavior(
                              WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);
                      }
                  } else {
                      getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                          | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                          | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_FULLSCREEN);
                  }
              }

              @Override
              public boolean dispatchTouchEvent(MotionEvent ev) { return true; }

              @Override
              public void onBackPressed() {}
          }
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Blank Launcher</string>
          </resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.BlankLauncher" parent="android:Theme">
                  <item name="android:windowShowWallpaper">true</item>
                  <item name="android:windowIsTranslucent">true</item>
                  <item name="android:windowBackground">@android:color/transparent</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowContentOverlay">@null</item>
              </style>
          </resources>
          EOF

      - name: Build release APK
        run: |
          keytool -genkey -v \
            -keystore app/release.keystore \
            -alias launcher -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass blanklauncher -keypass blanklauncher \
            -dname "CN=Blank Launcher, O=Dev, C=US"
          gradle assembleRelease --no-daemon -q

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blank-launcher-release
          path: app/build/outputs/apk/release/app-release.apk
