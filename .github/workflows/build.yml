name: Build Bluetooth Toggle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/bluetoothtoggle
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.bluetoothtoggle">
              <uses-permission android:name="android.permission.BLUETOOTH"/>
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
              <application
                  android:allowBackup="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/example/bluetoothtoggle/MainActivity.java << 'EOF'
          package com.example.bluetoothtoggle;
          import android.app.Activity;
          import android.bluetooth.BluetoothAdapter;
          import android.content.Intent;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  BluetoothAdapter bt = BluetoothAdapter.getDefaultAdapter();
                  if (bt == null) {
                      finish();
                      return;
                  }
                  if (Build.VERSION.SDK_INT >= 31) {
                      startActivity(new Intent(Settings.ACTION_BLUETOOTH_SETTINGS));
                  } else {
                      if (bt.isEnabled()) {
                          bt.disable();
                      } else {
                          bt.enable();
                      }
                  }
                  finish();
              }
          }
          EOF

      - name: Write resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">BT Toggle</string>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FFFFFF" />
              <corners android:radius="20dp" />
          </shape>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#1A1A2E"
                  android:pathData="M54,24 L54,84 M54,24 L66,36 M54,24 L42,36 M54,84 L66,72 M54,84 L42,72 M54,54 L66,42 M54,54 L42,66"
                  android:strokeColor="#1A1A2E"
                  android:strokeWidth="5"
                  android:strokeLineCap="round"/>
              <path
                  android:fillColor="#0082FC"
                  android:pathData="M54,24 L54,84 M54,24 L66,36 M54,24 L42,36 M54,84 L66,72 M54,84 L42,72 M54,54 L66,42 M54,54 L42,66"
                  android:strokeColor="#0082FC"
                  android:strokeWidth="4"
                  android:strokeLineCap="round"/>
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

      - name: Write Gradle files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "BluetoothToggle"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.bluetoothtoggle'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.bluetoothtoggle"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {}
          EOF

          cat > app/proguard-rules.pro << 'EOF'
          -keep class com.example.bluetoothtoggle.MainActivity
          -dontwarn **
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias bt-toggle \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass bttoggle123 \
            -keypass bttoggle123 \
            -dname "CN=BT Toggle, OU=App, O=Personal, L=Unknown, ST=Unknown, C=US"

      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks \
            -Pandroid.injected.signing.store.password=bttoggle123 \
            -Pandroid.injected.signing.key.alias=bt-toggle \
            -Pandroid.injected.signing.key.password=bttoggle123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bt-toggle-release
          path: app/build/outputs/apk/release/app-release.apk
