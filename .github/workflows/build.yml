name: Build Assign Home App APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/example/assignhomeapp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p gradle/wrapper

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.assignhomeapp">
              <application
                  android:allowBackup="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/example/assignhomeapp/MainActivity.java << 'EOF'
          package com.example.assignhomeapp;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.provider.Settings;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      startActivity(new Intent(Settings.ACTION_HOME_SETTINGS));
                  } catch (Exception e) {
                      startActivity(new Intent(Settings.ACTION_MANAGE_DEFAULT_APPS_SETTINGS));
                  }
                  finish();
              }
          }
          EOF

      - name: Write resources
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Assign Home App</string>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#FFFFFF" />
              <corners android:radius="20dp" />
          </shape>
          EOF

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <!-- Row 1 -->
              <path android:fillColor="#1A1A2E" android:pathData="M36,36 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
              <path android:fillColor="#1A1A2E" android:pathData="M54,36 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
              <path android:fillColor="#1A1A2E" android:pathData="M72,36 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
              <!-- Row 2 -->
              <path android:fillColor="#1A1A2E" android:pathData="M36,54 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
              <!-- Centre dot — #58CC02 -->
              <path android:fillColor="#58CC02" android:pathData="M54,54 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
              <path android:fillColor="#1A1A2E" android:pathData="M72,54 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
              <!-- Row 3 -->
              <path android:fillColor="#1A1A2E" android:pathData="M36,72 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
              <path android:fillColor="#1A1A2E" android:pathData="M54,72 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
              <path android:fillColor="#1A1A2E" android:pathData="M72,72 m-6,0 a6,6 0 1,0 12,0 a6,6 0 1,0 -12,0"/>
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

      - name: Write Gradle files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "AssignHomeApp"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.assignhomeapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.assignhomeapp"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {}
          EOF

          cat > app/proguard-rules.pro << 'EOF'
          -keep class com.example.assignhomeapp.MainActivity
          -dontwarn **
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Download Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias assign-home-app \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass assignhomeapp123 \
            -keypass assignhomeapp123 \
            -dname "CN=Assign Home App, OU=App, O=Personal, L=Unknown, ST=Unknown, C=US"

      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks \
            -Pandroid.injected.signing.store.password=assignhomeapp123 \
            -Pandroid.injected.signing.key.alias=assign-home-app \
            -Pandroid.injected.signing.key.password=assignhomeapp123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: assign-home-app-release
          path: app/build/outputs/apk/release/app-release.apk
